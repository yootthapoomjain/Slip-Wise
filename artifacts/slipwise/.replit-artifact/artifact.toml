kind = "web"
previewPath = "/"
title = "SlipWise"
version = "1.0.0"
id = "artifacts/slipwise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18350

[services.development]
run = "pnpm --filter @workspace/slipwise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/slipwise", "run", "build" ]
publicDir = "artifacts/slipwise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18350"
BASE_PATH = "/"
